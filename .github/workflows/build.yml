name: Build Plugin

permissions:
  contents: write

on:
  push:
    branches: [ main, master ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  test-go:
    name: Test Go
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.x'
          cache: true
          cache-dependency-path: go/go.mod

      - name: Run Go tests
        run: cd go && go test -v -race ./...

      - name: Run Go benchmarks
        run: cd go && go test -bench=. -benchtime=100ms -count=1 ./...

  test-js:
    name: Test JavaScript
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: '20'

      - name: Check JS syntax
        run: |
          node --check go/dashboard/helpers.js
          node --check go/dashboard/script.js

      - name: Run JS tests
        run: node --test go/dashboard/helpers.test.js

  build:
    name: Build Linux x86_64 Plugin
    runs-on: ubuntu-latest
    needs: [test-go, test-js]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.x'
          cache: true
          cache-dependency-path: go/go.mod

      - name: Build plugin
        run: |
          cd go
          CGO_ENABLED=1 GOOS=linux GOARCH=amd64 go build -buildmode=c-shared -buildvcs=false -o ../usage-statistics.so .
          cd ..
          rm -f usage-statistics.h
          ls -lh usage-statistics.so
          file usage-statistics.so
          nm -D usage-statistics.so | grep ' cliproxy_plugin_init$'

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: usage-statistics-plugin
          path: usage-statistics.so
          retention-days: 90

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v3
        with:
          files: usage-statistics.so
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  verify:
    name: Verify Build
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: usage-statistics-plugin

      - name: Verify plugin file
        run: |
          ls -lh usage-statistics.so
          file usage-statistics.so
          if [ ! -f "usage-statistics.so" ]; then
            echo "Plugin file not found!"
            exit 1
          fi
          SIZE=$(stat -f%z usage-statistics.so 2>/dev/null || stat -c%s usage-statistics.so)
          if [ "$SIZE" -lt 1000000 ]; then
            echo "Plugin file too small (< 1MB), probably incomplete"
            exit 1
          fi
          nm -D usage-statistics.so | grep ' cliproxy_plugin_init$'
          echo "✓ Plugin file verified"

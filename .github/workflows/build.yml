name: Build Plugin

permissions:
  contents: write

on:
  push:
    branches: [ main, master ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  test-go:
    name: Test Go
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.x'
          cache: true
          cache-dependency-path: go/go.mod

      - name: Run Go tests
        run: cd go && go test -v -race ./...

      - name: Run Go benchmarks
        run: cd go && go test -run '^$' -bench='Benchmark(RecordIncremental|Snapshot)$' -benchtime=100ms -count=1 ./...

  test-js:
    name: Test JavaScript
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: '20'

      - name: Check JS syntax
        run: |
          node --check go/dashboard/helpers.js
          node --check go/dashboard/script.js

      - name: Run JS tests
        run: node --test go/dashboard/*.test.js

  build:
    name: Build ${{ matrix.platform }} Plugin
    runs-on: ${{ matrix.runner }}
    needs: [test-go, test-js]
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux-amd64
            runner: ubuntu-latest
            goos: linux
            goarch: amd64
            ext: so
            cc: gcc
            apt: ''
            file_pattern: 'ELF 64-bit.*x86-64'
          - platform: linux-arm64
            runner: ubuntu-latest
            goos: linux
            goarch: arm64
            ext: so
            cc: aarch64-linux-gnu-gcc
            apt: gcc-aarch64-linux-gnu
            file_pattern: 'ELF 64-bit.*(ARM aarch64|aarch64)'
          - platform: darwin-amd64
            runner: macos-latest
            goos: darwin
            goarch: amd64
            ext: dylib
            cc: clang -arch x86_64
            apt: ''
            file_pattern: 'Mach-O 64-bit.*x86_64'
          - platform: darwin-arm64
            runner: macos-latest
            goos: darwin
            goarch: arm64
            ext: dylib
            cc: clang -arch arm64
            apt: ''
            file_pattern: 'Mach-O 64-bit.*arm64'
          - platform: windows-amd64
            runner: ubuntu-latest
            goos: windows
            goarch: amd64
            ext: dll
            cc: x86_64-w64-mingw32-gcc
            apt: gcc-mingw-w64-x86-64 binutils-mingw-w64-x86-64
            file_pattern: 'PE32\+.*x86-64'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install cross compiler
        if: matrix.apt != ''
        run: |
          sudo apt-get update
          sudo apt-get install -y ${{ matrix.apt }}

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.x'
          cache: true
          cache-dependency-path: go/go.mod

      - name: Check tag version
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          tag_version="${GITHUB_REF_NAME#v}"
          plugin_version="$(sed -n 's/^const pluginVersion = "\([^"]*\)"/\1/p' go/register.go)"
          if [ "$plugin_version" != "$tag_version" ]; then
            echo "pluginVersion=$plugin_version does not match tag=$tag_version"
            exit 1
          fi

      - name: Build plugin
        run: |
          cd go
          output="../usage-statistics-${{ matrix.platform }}.${{ matrix.ext }}"
          export CC="${{ matrix.cc }}"
          export CGO_ENABLED=1
          export GOOS="${{ matrix.goos }}"
          export GOARCH="${{ matrix.goarch }}"
          go build -buildmode=c-shared -buildvcs=false -o "$output" .
          cd ..
          rm -f usage-statistics*.h
          asset="usage-statistics-${{ matrix.platform }}.${{ matrix.ext }}"
          ls -lh "$asset"
          file "$asset" | grep -Eq '${{ matrix.file_pattern }}'
          case "${{ matrix.goos }}" in
            linux) readelf -Ws "$asset" | grep ' cliproxy_plugin_init$' ;;
            darwin) nm -gU "$asset" | grep ' _cliproxy_plugin_init$' ;;
            windows) x86_64-w64-mingw32-nm -g "$asset" | grep ' cliproxy_plugin_init$' ;;
          esac

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: usage-statistics-plugin-${{ matrix.platform }}
          path: usage-statistics-${{ matrix.platform }}.${{ matrix.ext }}
          retention-days: 90

  verify:
    name: Verify Build
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: usage-statistics-plugin-*
          path: dist
          merge-multiple: true

      - name: Verify plugin files
        run: |
          set -eu
          found=0
          for asset in dist/usage-statistics-*.*; do
            [ -e "$asset" ] || continue
            found=1
            echo "Verifying $asset"
            ls -lh "$asset"
            file "$asset"
            case "$asset" in
              *linux-amd64.so) pattern='ELF 64-bit.*x86-64' ;;
              *linux-arm64.so) pattern='ELF 64-bit.*(ARM aarch64|aarch64)' ;;
              *darwin-amd64.dylib) pattern='Mach-O 64-bit.*x86_64' ;;
              *darwin-arm64.dylib) pattern='Mach-O 64-bit.*arm64' ;;
              *windows-amd64.dll) pattern='PE32\+.*x86-64' ;;
              *) echo "Unexpected asset: $asset"; exit 1 ;;
            esac
            file "$asset" | grep -Eq "$pattern"
            SIZE=$(stat -f%z "$asset" 2>/dev/null || stat -c%s "$asset")
            if [ "$SIZE" -lt 1000000 ]; then
              echo "Plugin file too small (< 1MB), probably incomplete"
              exit 1
            fi
          done
          if [ "$found" -ne 1 ]; then
            echo "No plugin artifacts found"
            exit 1
          fi
          echo "✓ Plugin files verified"

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: verify
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: usage-statistics-plugin-*
          path: dist
          merge-multiple: true

      - name: Add legacy amd64 asset alias
        run: cp dist/usage-statistics-linux-amd64.so dist/usage-statistics.so

      - name: Create Release
        uses: softprops/action-gh-release@v3
        with:
          files: |
            dist/usage-statistics.so
            dist/usage-statistics-linux-amd64.so
            dist/usage-statistics-linux-arm64.so
            dist/usage-statistics-darwin-amd64.dylib
            dist/usage-statistics-darwin-arm64.dylib
            dist/usage-statistics-windows-amd64.dll
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
